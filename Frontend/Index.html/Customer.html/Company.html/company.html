<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BusTicket - Customer</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:linear-gradient(135deg,#0b3b3f,#1a4a5f);min-height:100vh;padding:1rem;}
        .container{max-width:600px;margin:0 auto;}
        .card{background:white;border-radius:24px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 10px 20px rgba(0,0,0,0.2);}
        h2{color:#0b3b3f;margin-bottom:1rem;}
        input,select,button{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:16px;font-size:1rem;}
        button{background:#ff7e5e;color:white;border:none;font-weight:bold;cursor:pointer;}
        .bus-card{background:#f9f9f9;border-radius:16px;padding:1rem;margin-bottom:1rem;}
        .seat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:1rem 0;}
        .seat{background:#ddd;text-align:center;padding:8px;border-radius:12px;cursor:pointer;}
        .seat.selected{background:#ff7e5e;color:white;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:100;}
        .modal-content{background:white;border-radius:24px;padding:1.5rem;width:90%;max-width:400px;}
        .toast{position:fixed;bottom:20px;left:20px;right:20px;background:#333;color:white;text-align:center;padding:12px;border-radius:30px;display:none;}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🚌 Find Your Bus</h2>
        <input type="text" id="fromCity" placeholder="From" value="Lusaka">
        <input type="text" id="toCity" placeholder="To" value="Livingstone">
        <input type="date" id="travelDate">
        <button onclick="searchBuses()">🔍 Search</button>
    </div>
    <div id="results"></div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3>Complete Payment</h3>
        <p id="paymentBusInfo"></p>
        <label>Select mobile money:</label>
        <select id="mobileMoneyProvider">
            <option value="mtn">MTN Mobile Money</option>
            <option value="airtel">Airtel Money</option>
            <option value="zamtel">Zamtel Kwik</option>
        </select>
        <input type="tel" id="phoneNumber" placeholder="Phone number (e.g., 0977xxxxxx)">
        <p>Total: $<span id="paymentTotal">0</span></p>
        <button onclick="processPayment()">Confirm Payment</button>
        <button class="cancel-btn" onclick="closePaymentModal()">Cancel</button>
    </div>
</div>

<div id="codeModal" class="modal">
    <div class="modal-content">
        <h3>✅ Booking Confirmed!</h3>
        <p>Your unique travel code:</p>
        <h1 id="uniqueCode" style="font-size:2rem;text-align:center;">------</h1>
        <p>Present this code at the border.</p>
        <button onclick="closeCodeModal()">Close</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let buses = [
        { id: 1, company: "Royal Express", from: "Lusaka", to: "Livingstone", departure: "08:00", duration: "7h", price: 45, seats: 40, available: 40 },
        { id: 2, company: "Mazhandu", from: "Lusaka", to: "Livingstone", departure: "14:00", duration: "6h 30m", price: 55, seats: 50, available: 50 },
        { id: 3, company: "Power Tools", from: "Lusaka", to: "Chipata", departure: "06:00", duration: "8h", price: 60, seats: 45, available: 45 }
    ];
    let currentResults = [];
    let selectedBus = null;
    let selectedSeats = [];

    document.getElementById('travelDate').value = new Date().toISOString().split('T')[0];

    function searchBuses() {
        const from = document.getElementById('fromCity').value.toLowerCase();
        const to = document.getElementById('toCity').value.toLowerCase();
        currentResults = buses.filter(b => b.from.toLowerCase().includes(from) && b.to.toLowerCase().includes(to));
        displayBuses();
    }

    function displayBuses() {
        const container = document.getElementById('results');
        if (currentResults.length === 0) {
            container.innerHTML = '<div class="card">No buses found</div>';
            return;
        }
        let html = '';
        for (let bus of currentResults) {
            html += `
                <div class="card">
                    <h3>${bus.company}</h3>
                    <p>${bus.from} → ${bus.to}</p>
                    <p>Departure: ${bus.departure} | Duration: ${bus.duration}</p>
                    <p>Price: $${bus.price} | Seats left: ${bus.available}</p>
                    <button onclick="openSeatSelection(${bus.id})">Select Seats</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function openSeatSelection(busId) {
        selectedBus = currentResults.find(b => b.id === busId);
        selectedSeats = [];
        let seatHtml = '<div class="seat-grid">';
        for (let i = 1; i <= selectedBus.seats; i++) {
            seatHtml += `<div class="seat" data-seat="${i}">${i}</div>`;
        }
        seatHtml += '</div><button onclick="confirmSeats()">Book now</button>';
        showSeatModal(seatHtml);
    }

    function showSeatModal(seatHtml) {
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3>Select seats (max 6)</h3>${seatHtml}<button onclick="closeModal(this)">Cancel</button></div>`;
        document.body.appendChild(modal);
        document.querySelectorAll('.seat').forEach(seat => {
            seat.onclick = () => {
                let num = parseInt(seat.dataset.seat);
                if (selectedSeats.includes(num)) {
                    selectedSeats = selectedSeats.filter(s => s !== num);
                    seat.classList.remove('selected');
                } else if (selectedSeats.length < 6) {
                    selectedSeats.push(num);
                    seat.classList.add('selected');
                } else {
                    showToast("Max 6 seats", "error");
                }
            };
        });
        window.confirmSeats = () => {
            if (selectedSeats.length === 0) { showToast("Select at least one seat", "error"); return; }
            document.body.removeChild(modal);
            openPayment();
        };
    }

    function openPayment() {
        document.getElementById('paymentBusInfo').innerHTML = `${selectedBus.company} | ${selectedBus.from}→${selectedBus.to} | ${selectedSeats.length} seats`;
        document.getElementById('paymentTotal').innerText = selectedSeats.length * selectedBus.price;
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function processPayment() {
        let phone = document.getElementById('phoneNumber').value;
        let provider = document.getElementById('mobileMoneyProvider').value;
        if (!phone) { showToast("Enter phone number", "error"); return; }
        let code = Math.floor(100000 + Math.random() * 900000);
        let booking = {
            id: Date.now(),
            bus: selectedBus.company,
            route: `${selectedBus.from}→${selectedBus.to}`,
            date: document.getElementById('travelDate').value,
            seats: selectedSeats,
            phone: phone,
            total: selectedSeats.length * selectedBus.price,
            code: code,
            provider: provider
        };
        let bookings = JSON.parse(localStorage.getItem('customer_bookings') || '[]');
        bookings.push(booking);
        localStorage.setItem('customer_bookings', JSON.stringify(bookings));
        selectedBus.available -= selectedSeats.length;
        closePaymentModal();
        document.getElementById('uniqueCode').innerText = code;
        document.getElementById('codeModal').style.display = 'flex';
    }

    function closePaymentModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }
    function closeCodeModal() {
        document.getElementById('codeModal').style.display = 'none';
        searchBuses();
    }
    function showToast(msg, type) {
        let toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    function closeModal(btn) { btn.parentElement.parentElement.remove(); }
    searchBuses();
</script>
</body>
</html>
